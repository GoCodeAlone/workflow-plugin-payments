name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
env:
  GOPRIVATE: github.com/GoCodeAlone/*
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Configure Git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.RELEASES_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - run: go test -race ./...
      - run: go vet ./...

  plugin-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Configure Git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.RELEASES_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - name: Verify plugin.json exists
        run: |
          if [ ! -f plugin.json ]; then
            echo "ERROR: plugin.json is missing" >&2
            exit 1
          fi
      - name: Validate plugin manifest (strict contracts)
        run: |
          WFCTL_VERSION=$(go list -m -json github.com/GoCodeAlone/workflow | grep '"Version"' | sed 's/.*"Version": "\(.*\)".*/\1/')
          go run github.com/GoCodeAlone/workflow/cmd/wfctl@${WFCTL_VERSION} plugin validate --file plugin.json
