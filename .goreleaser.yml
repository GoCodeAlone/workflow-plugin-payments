version: 2

before:
  hooks:
    - bash scripts/goreleaser-prepare.sh {{ .Version }}

after:
  hooks:
    - mv plugin.json.orig plugin.json

builds:
  - id: workflow-plugin-payments
    main: ./cmd/workflow-plugin-payments
    binary: workflow-plugin-payments
    env:
      - CGO_ENABLED=0
      - GOPRIVATE=github.com/GoCodeAlone/*
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X github.com/GoCodeAlone/workflow-plugin-payments/internal.Version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    files:
      - plugin.json
      - plugin.contracts.json
      - LICENSE

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: GoCodeAlone
    name: workflow-plugin-payments
