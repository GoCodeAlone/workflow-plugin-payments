version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: workflow-plugin-payments
    main: ./cmd/workflow-plugin-payments
    binary: workflow-plugin-payments
    env:
      - CGO_ENABLED=0
      - GOPRIVATE=github.com/GoCodeAlone/*
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - plugin.json
      - LICENSE

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: GoCodeAlone
    name: workflow-plugin-payments

signs:
  - artifacts: checksum
    args:
      - "--batch"
      - "-u"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"
