version: 2

# Note: goreleaser v2 has no top-level `after:` block — only `before:` is
# valid for project hooks. plugin.json restore is handled by
# scripts/goreleaser-prepare.sh's `trap cleanup ERR` on error paths;
# success-path cleanup is unnecessary because CI runs on an ephemeral
# checkout each time, so persistent state on disk does not matter.
before:
  hooks:
    - bash scripts/goreleaser-prepare.sh {{ .Version }}

builds:
  - id: workflow-plugin-payments
    main: ./cmd/workflow-plugin-payments
    binary: workflow-plugin-payments
    env:
      - CGO_ENABLED=0
      - GOPRIVATE=github.com/GoCodeAlone/*
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X github.com/GoCodeAlone/workflow-plugin-payments/internal.Version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    files:
      - plugin.json
      - plugin.contracts.json
      - LICENSE

checksum:
  name_template: "checksums.txt"

release:
  draft: true
  github:
    owner: GoCodeAlone
    name: workflow-plugin-payments
