# compat-check.yaml — minimal config exercising every step.payment_* config field
# this plugin advertises. Drives the workflow-compat CI gate that validates
# the plugin against the latest workflow release with --strict.
#
# Validation-only: never deployed. Stripe key is a fake test stub.

modules:
    - name: stripe
      type: payments.provider
      config:
        provider: stripe
        secret_key: sk_test_compat_check_stub
        default_currency: usd

pipelines:
    compat-payments:
        trigger:
            type: http
            config:
                path: /compat/payments
                method: POST
        steps:
            # Exercises PaymentFeeCalculateConfig.{amount, currency,
            # platform_fee_percent} — all strings as of v0.4.5 for BMW template
            # compatibility ('{{ ...platform_fee_percent | default "5.0" }}').
            - name: calc_fees
              type: step.payment_fee_calculate
              config:
                module: stripe
                amount: "1000"
                currency: usd
                platform_fee_percent: "5.0"

            # Exercises PaymentChargeConfig.{amount, currency, capture_method,
            # description, customer_id} — added in v0.4.5 as strings so BMW
            # templates survive STRICT_PROTO decode.
            - name: create_charge
              type: step.payment_charge
              config:
                module: stripe
                amount: "1000"
                currency: usd
                capture_method: manual
                description: "compat-check charge"

            # Exercises PaymentCaptureConfig.{charge_id, amount}.
            - name: capture_payment
              type: step.payment_capture
              config:
                module: stripe
                charge_id: "ch_test_compat"
                amount: 1000

            # Exercises PaymentRefundConfig.{charge_id, amount as string, reason}
            # added in v0.4.4. Amount is string for BMW template compatibility.
            - name: refund_payment
              type: step.payment_refund
              config:
                module: stripe
                charge_id: "ch_test_compat"
                amount: "500"
                reason: requested_by_customer

    compat-customer-and-subscription:
        trigger:
            type: http
            config:
                path: /compat/recurring
                method: POST
        steps:
            # Exercises PaymentCustomerEnsureConfig.{email, name} added in v0.4.5.
            - name: ensure_customer
              type: step.payment_customer_ensure
              config:
                module: stripe
                email: "compat@example.test"
                name: "Compat User"

            # Exercises PaymentSubscriptionCreateConfig.{customer_id, amount,
            # currency, interval} added in v0.4.5 (inline-pricing mode). All
            # strings so BMW templates render directly.
            - name: create_subscription
              type: step.payment_subscription_create
              config:
                module: stripe
                customer_id: "cus_compat"
                amount: "1500"
                currency: usd
                interval: month

    compat-webhook-ensure:
        trigger:
            type: cli
            config:
                command: compat-ensure-webhook
        steps:
            # Exercises PaymentWebhookEndpointEnsureConfig.{url, events, mode,
            # description}. v0.4.5 adds url+events+mode so the entire request
            # can be supplied via config: (BMW operator-pipeline pattern).
            - name: ensure_endpoint
              type: step.payment_webhook_endpoint_ensure
              config:
                module: stripe
                url: "https://example.test/webhook"
                events:
                    - payment_intent.succeeded
                    - issuing_authorization.request
                description: "compat-check webhook"
                mode: ensure

    # Exercises PaymentSubscriptionCancelConfig.{subscription_id,
    # cancel_at_period_end as string} added in v0.4.4. The bool field is
    # a string so YAML templates can render it directly.
    compat-subscription-cancel:
        trigger:
            type: cli
            config:
                command: compat-cancel-subscription
        steps:
            - name: cancel_subscription
              type: step.payment_subscription_cancel
              config:
                module: stripe
                subscription_id: "sub_test_compat"
                cancel_at_period_end: "true"
