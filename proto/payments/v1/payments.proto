}

// PaymentMethodAttachOutput is the output from step.payment_method_attach.
message PaymentMethodAttachOutput {
  string payment_method_id = 1;
  string type = 2;
  string error = 3;
}

// PaymentMethodListConfig configures the step.payment_method_list step.
message PaymentMethodListConfig {
  string module = 1;
}

// PaymentMethodListInput is the input for step.payment_method_list.
message PaymentMethodListInput {
  string customer_id = 1;
  string type = 2;
}

// PaymentMethodListOutput is the output from step.payment_method_list.
message PaymentMethodListOutput {
  string payment_methods = 1;
  int64 count = 2;
  string error = 3;
}
