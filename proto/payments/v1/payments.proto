}

// PaymentInvoiceListConfig configures the step.payment_invoice_list step.
message PaymentInvoiceListConfig {
  string module = 1;
}

// PaymentInvoiceListInput is the input for step.payment_invoice_list.
message PaymentInvoiceListInput {
  string customer_id = 1;
  int64 limit = 2;
  string status = 3;
