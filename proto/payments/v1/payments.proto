syntax = "proto3";

package workflow.plugins.payments.v1;

option go_package = "github.com/GoCodeAlone/workflow-plugin-payments/proto/payments/v1;paymentsv1";

// ProviderConfig is the configuration for the payments.provider module.
message ProviderConfig {
  // provider selects the payment backend: "stripe" or "paypal".
  string provider = 1;
  // secretKey is the Stripe secret API key (sk_live_... or sk_test_...).
  string secret_key = 2;
  // webhookSecret is the Stripe webhook signing secret (whsec_...).
  string webhook_secret = 3;
  // defaultCurrency is the ISO 4217 default currency for Stripe charges.
  string default_currency = 4;
  // clientId is the PayPal application client ID.
  string client_id = 5;
  // clientSecret is the PayPal application client secret.
  string client_secret = 6;
  // environment selects the PayPal API environment: "sandbox", "production", or "live".
  string environment = 7;
  // webhookId is the PayPal webhook ID for verifying inbound webhook payloads.
  string webhook_id = 8;
}

// PaymentChargeConfig configures the step.payment_charge step.
message PaymentChargeConfig {
  string module = 1;
  // amount is the charge amount in the smallest currency unit, expressed as a
  // string so YAML templates (which always render as strings) can supply it
  // directly under STRICT_PROTO dispatch. When non-empty, takes precedence
  // over PaymentChargeInput.amount. Handlers parse via strconv.ParseInt.
  string amount = 2;
  // currency is the ISO 4217 currency code. When non-empty, takes precedence
  // over PaymentChargeInput.currency.
  string currency = 3;
  // capture_method is "automatic" or "manual". When non-empty, takes
  // precedence over PaymentChargeInput.capture_method.
  string capture_method = 4;
  // description is an optional description attached to the charge. When
  // non-empty, takes precedence over PaymentChargeInput.description.
  string description = 5;
  // customer_id is the provider customer ID to attach the charge to. When
  // non-empty, takes precedence over PaymentChargeInput.customer_id.
  string customer_id = 6;
}

// PaymentChargeInput is the input for step.payment_charge.
message PaymentChargeInput {
  int64 amount = 1;
  string currency = 2;
  string customer_id = 3;
  string capture_method = 4;
  string description = 5;
}

// PaymentChargeOutput is the output from step.payment_charge.
message PaymentChargeOutput {
  string charge_id = 1;
  string client_secret = 2;
  string status = 3;
  int64 amount = 4;
  string error = 5;
}

// PaymentCaptureConfig configures the step.payment_capture step.
message PaymentCaptureConfig {
  string module = 1;
  // charge_id is the charge/PaymentIntent ID to capture. When set, takes
  // precedence over PaymentCaptureInput.charge_id (allows templating in YAML).
  string charge_id = 2;
  // amount is the partial-capture amount in the smallest currency unit. 0
  // captures the full authorised amount. When non-zero, takes precedence over
  // PaymentCaptureInput.amount.
  int64 amount = 3;
}

// PaymentCaptureInput is the input for step.payment_capture.
message PaymentCaptureInput {
  string charge_id = 1;
  int64 amount = 2;
}

// PaymentCaptureOutput is the output from step.payment_capture.
message PaymentCaptureOutput {
  string status = 1;
  int64 amount = 2;
  string error = 3;
}

// PaymentRefundConfig configures the step.payment_refund step.
message PaymentRefundConfig {
  string module = 1;
  // charge_id is the charge/PaymentIntent ID to refund. When set, takes
  // precedence over PaymentRefundInput.charge_id (allows templating in YAML).
  string charge_id = 2;
  // amount is the partial-refund amount in the smallest currency unit,
  // expressed as a string so YAML templates (which always render as strings)
  // can supply it directly. Empty/missing means full-charge refund. When
  // non-empty, takes precedence over PaymentRefundInput.amount. Handlers
  // parse via strconv.ParseInt.
  string amount = 3;
  // reason is an optional refund reason (e.g. requested_by_customer,
  // duplicate, fraudulent). When non-empty, takes precedence over
  // PaymentRefundInput.reason.
  string reason = 4;
}

// PaymentRefundInput is the input for step.payment_refund.
message PaymentRefundInput {
  string charge_id = 1;
  int64 amount = 2;
  string reason = 3;
}

// PaymentRefundOutput is the output from step.payment_refund.
message PaymentRefundOutput {
  string refund_id = 1;
  string status = 2;
  string error = 3;
}

// PaymentFeeCalculateConfig configures the step.payment_fee_calculate step.
message PaymentFeeCalculateConfig {
  string module = 1;
  // amount is the gross amount in the smallest currency unit, expressed as a
  // string so YAML templates (which always render as strings) can supply it
  // directly under STRICT_PROTO dispatch. When non-empty, takes precedence
  // over PaymentFeeCalculateInput.amount. Handlers parse via strconv.ParseInt.
  string amount = 2;
  // currency is the ISO 4217 currency code. When non-empty, takes precedence
  // over PaymentFeeCalculateInput.currency.
  string currency = 3;
  // platform_fee_percent is the platform fee percentage (0-100), expressed
  // as a string so YAML templates (which always render as strings) can supply
  // it directly under STRICT_PROTO dispatch. When non-empty, takes precedence
  // over PaymentFeeCalculateInput.platform_fee_percent. Handlers parse via
  // strconv.ParseFloat. v0.4.5: type changed from double → string to fix BMW
  // template-decoded literal rejection.
  string platform_fee_percent = 4;
}

// PaymentFeeCalculateInput is the input for step.payment_fee_calculate.
message PaymentFeeCalculateInput {
  int64 amount = 1;
  string currency = 2;
  double platform_fee_percent = 3;
}

// PaymentFeeCalculateOutput is the output from step.payment_fee_calculate.
message PaymentFeeCalculateOutput {
  int64 contribution_amount = 1;
  int64 processing_fee = 2;
  int64 platform_fee = 3;
  int64 total_charge = 4;
  string error = 5;
}

// PaymentCustomerEnsureConfig configures the step.payment_customer_ensure step.
message PaymentCustomerEnsureConfig {
  string module = 1;
  // email is the customer email. When non-empty, takes precedence over
  // PaymentCustomerEnsureInput.email (allows templating in YAML).
  string email = 2;
  // name is the customer display name. When non-empty, takes precedence over
  // PaymentCustomerEnsureInput.name (allows templating in YAML).
  string name = 3;
}

// PaymentCustomerEnsureInput is the input for step.payment_customer_ensure.
message PaymentCustomerEnsureInput {
  string email = 1;
  string name = 2;
}

// PaymentCustomerEnsureOutput is the output from step.payment_customer_ensure.
message PaymentCustomerEnsureOutput {
  string customer_id = 1;
  string email = 2;
  string name = 3;
  string error = 4;
}

// PaymentSubscriptionCreateConfig configures the step.payment_subscription_create step.
message PaymentSubscriptionCreateConfig {
  string module = 1;
  // customer_id is the provider customer ID to subscribe. When non-empty,
  // takes precedence over PaymentSubscriptionCreateInput.customer_id (allows
  // templating in YAML).
  string customer_id = 2;
  // price_id is the provider price ID. When non-empty, takes precedence over
  // PaymentSubscriptionCreateInput.price_id. Inline-pricing callers leave
  // empty and supply amount + currency + interval instead.
  string price_id = 3;
  // amount is the per-interval amount in the smallest currency unit,
  // expressed as a string so YAML templates can supply it directly under
  // STRICT_PROTO dispatch. Used for inline price_data when price_id is empty.
  // Handlers parse via strconv.ParseInt.
  string amount = 4;
  // currency is the ISO 4217 currency code. Used for inline price_data when
  // price_id is empty.
  string currency = 5;
  // interval is the billing frequency: day|week|month|year. Used for inline
  // price_data when price_id is empty.
  string interval = 6;
}

// PaymentSubscriptionCreateInput is the input for step.payment_subscription_create.
message PaymentSubscriptionCreateInput {
  string customer_id = 1;
  string price_id = 2;
}

// PaymentSubscriptionCreateOutput is the output from step.payment_subscription_create.
message PaymentSubscriptionCreateOutput {
  string subscription_id = 1;
  string status = 2;
  string error = 3;
}

// PaymentSubscriptionUpdateConfig configures the step.payment_subscription_update step.
message PaymentSubscriptionUpdateConfig {
  string module = 1;
}

// PaymentSubscriptionUpdateInput is the input for step.payment_subscription_update.
message PaymentSubscriptionUpdateInput {
  string subscription_id = 1;
  string price_id = 2;
}

// PaymentSubscriptionUpdateOutput is the output from step.payment_subscription_update.
message PaymentSubscriptionUpdateOutput {
  string subscription_id = 1;
  string status = 2;
  string error = 3;
}

// PaymentSubscriptionCancelConfig configures the step.payment_subscription_cancel step.
message PaymentSubscriptionCancelConfig {
  string module = 1;
  // subscription_id is the provider subscription ID to cancel. When non-empty,
  // takes precedence over PaymentSubscriptionCancelInput.subscription_id
  // (allows templating in YAML).
  string subscription_id = 2;
  // cancel_at_period_end controls whether the subscription remains active
  // until the end of the current billing period. Expressed as a string so
  // YAML templates (e.g. "true") can supply it directly under STRICT_PROTO
  // dispatch. When non-empty, takes precedence over
  // PaymentSubscriptionCancelInput.cancel_at_period_end. Handlers parse via
  // strconv.ParseBool.
  string cancel_at_period_end = 3;
}

// PaymentSubscriptionCancelInput is the input for step.payment_subscription_cancel.
message PaymentSubscriptionCancelInput {
  string subscription_id = 1;
  bool cancel_at_period_end = 2;
}

// PaymentSubscriptionCancelOutput is the output from step.payment_subscription_cancel.
message PaymentSubscriptionCancelOutput {
  string subscription_id = 1;
  string status = 2;
  string error = 3;
}

// PaymentCheckoutCreateConfig configures the step.payment_checkout_create step.
message PaymentCheckoutCreateConfig {
  string module = 1;
}

// PaymentCheckoutCreateInput is the input for step.payment_checkout_create.
message PaymentCheckoutCreateInput {
  string customer_id = 1;
  string price_id = 2;
  string success_url = 3;
  string cancel_url = 4;
  string mode = 5;
}

// PaymentCheckoutCreateOutput is the output from step.payment_checkout_create.
message PaymentCheckoutCreateOutput {
  string url = 1;
  string session_id = 2;
  string error = 3;
}

// PaymentPortalCreateConfig configures the step.payment_portal_create step.
message PaymentPortalCreateConfig {
  string module = 1;
}

// PaymentPortalCreateInput is the input for step.payment_portal_create.
message PaymentPortalCreateInput {
  string customer_id = 1;
  string return_url = 2;
}

// PaymentPortalCreateOutput is the output from step.payment_portal_create.
message PaymentPortalCreateOutput {
  string url = 1;
  string session_id = 2;
  string error = 3;
}

// PaymentWebhookVerifyConfig configures the step.payment_webhook_verify step.
message PaymentWebhookVerifyConfig {
  string module = 1;
}

// PaymentWebhookVerifyInput is the input for step.payment_webhook_verify.
message PaymentWebhookVerifyInput {
  string request_body = 1;
  string stripe_signature = 2;
  string paypal_transmission_id = 3;
  string paypal_transmission_sig = 4;
  string paypal_cert_url = 5;
  string paypal_auth_algo = 6;
  string paypal_transmission_time = 7;
}

// PaymentWebhookVerifyOutput is the output from step.payment_webhook_verify.
message PaymentWebhookVerifyOutput {
  string event_type = 1;
  string event_id = 2;
  string error = 3;
}

// PaymentWebhookEndpointEnsureConfig configures the step.payment_webhook_endpoint_ensure step.
message PaymentWebhookEndpointEnsureConfig {
  string module = 1;
  // description is the human-readable description stored on the provider
  // endpoint. When non-empty, takes precedence over
  // PaymentWebhookEndpointEnsureInput.description.
  string description = 2;
  // url is the https URL the provider POSTs events to. When non-empty,
  // takes precedence over PaymentWebhookEndpointEnsureInput.url (allows
  // operator pipelines to supply it inline under STRICT_PROTO dispatch).
  string url = 3;
  // events is the list of provider event names the endpoint subscribes to.
  // When non-empty, takes precedence over PaymentWebhookEndpointEnsureInput.events.
  // Repeated to match BMW's YAML-list shape (events: [a, b]).
  repeated string events = 4;
  // mode is "ensure" (default) or "replace". When non-empty, takes precedence
  // over PaymentWebhookEndpointEnsureInput.mode.
  string mode = 5;
}

// PaymentWebhookEndpointEnsureInput is the input for step.payment_webhook_endpoint_ensure.
message PaymentWebhookEndpointEnsureInput {
  string url = 1;
  repeated string events = 2;
  string description = 3;
  string mode = 4;
}

// PaymentWebhookEndpointEnsureOutput is the output from step.payment_webhook_endpoint_ensure.
message PaymentWebhookEndpointEnsureOutput {
  string endpoint_id = 1;
  bool created = 2;
  bool events_drift = 3;
  string signing_secret = 4;
  string error = 5;
}

